<svg xmlns="http://www.w3.org/2000/svg" width="880" height="210" viewBox="0 0 880 210" role="img" aria-label="Timeline: 2019 started in bars and restaurants in Barcelona. 2025 last service, went all in on code. 2026 IT Academy, shipped my first real API. Next: your team?">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="50%" stop-color="#fdf2f8"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="track" gradientUnits="userSpaceOnUse" x1="70" y1="100" x2="810" y2="100">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="35%" stop-color="#ec4899"/>
      <stop offset="70%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <style>
    text { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; }
    .year  { font-size: 21px; font-weight: 800; }
    .label { font-size: 14.5px; font-weight: 700; fill: #334155; }
    .sub   { font-size: 13px; fill: #64748b; }
  </style>

  <!-- card -->
  <rect x="1" y="1" width="878" height="208" rx="18" fill="url(#bg)" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- track -->
  <line x1="70" y1="100" x2="550" y2="100" stroke="url(#track)" stroke-width="4" stroke-linecap="round"/>
  <line x1="562" y1="100" x2="806" y2="100" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" stroke-dasharray="2 12" opacity="0.8"/>

  <!-- 2019 · amber -->
  <circle cx="110" cy="100" r="17" fill="#f59e0b" opacity="0.18"/>
  <circle cx="110" cy="100" r="10" fill="#f59e0b" stroke="#ffffff" stroke-width="3"/>
  <text x="110" y="64" text-anchor="middle" class="year" fill="#d97706">2019</text>
  <text x="110" y="143" text-anchor="middle" class="label">Bars &amp; restaurants</text>
  <text x="110" y="164" text-anchor="middle" class="sub">six years of service in Barcelona</text>

  <!-- 2025 · pink -->
  <circle cx="330" cy="100" r="17" fill="#ec4899" opacity="0.18"/>
  <circle cx="330" cy="100" r="10" fill="#ec4899" stroke="#ffffff" stroke-width="3"/>
  <text x="330" y="64" text-anchor="middle" class="year" fill="#db2777">2025</text>
  <text x="330" y="143" text-anchor="middle" class="label">Last service</text>
  <text x="330" y="164" text-anchor="middle" class="sub">went all in on code</text>

  <!-- 2026 · violet -->
  <circle cx="550" cy="100" r="17" fill="#8b5cf6" opacity="0.18"/>
  <circle cx="550" cy="100" r="10" fill="#8b5cf6" stroke="#ffffff" stroke-width="3"/>
  <text x="550" y="64" text-anchor="middle" class="year" fill="#7c3aed">2026</text>
  <text x="550" y="143" text-anchor="middle" class="label">IT Academy</text>
  <text x="550" y="164" text-anchor="middle" class="sub">shipped my first real API</text>

  <!-- next · blue -->
  <circle cx="770" cy="100" r="22" fill="#3b82f6" opacity="0.12"/>
  <circle cx="770" cy="100" r="17" fill="#3b82f6" opacity="0.2"/>
  <circle cx="770" cy="100" r="10" fill="#3b82f6" stroke="#ffffff" stroke-width="3"/>
  <text x="770" y="64" text-anchor="middle" class="year" fill="#2563eb">next</text>
  <text x="770" y="143" text-anchor="middle" class="label">Your team?</text>
  <text x="770" y="164" text-anchor="middle" class="sub">open to full-stack roles</text>
</svg>
